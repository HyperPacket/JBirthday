<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radiology Web-PACS: Patient Study</title>
    <style>
        :root {
            --x: 50%;
            --y: 50%;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; 
            touch-action: none; 
        }

        /* Medical Overlay Text */
        .ui-layer {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            color: #00FF00;
            font-size: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            opacity: 0.7;
        }

        .row { display: flex; justify-content: space-between; }

        /* BOTTOM LAYER: The Animated Surprise */
        .birthday-layer {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, #ff0066, #ffcc00, #00ffff, #7000ff);
            background-size: 400% 400%;
            animation: gradientShift 5s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Grid for the Text and Side GIFs */
        .header-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Left GIF | Text | Right GIF */
            align-items: center;
            justify-items: center;
            width: 100%;
            gap: 10px;
        }

        .birthday-text {
            color: white;
            font-size: 1.8rem; /* Scaled for phone screens */
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px #ff0066;
            animation: pulse 1.5s infinite alternate;
            text-align: center;
            line-height: 1.1;
        }

        /* All GIFs same size */
        .bday-gif {
            width: 80px; 
            height: 80px;
            object-fit: cover; /* Keeps them square and neat */
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .main-gif-under {
            margin-top: 20px;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* TOP LAYER: The X-Ray Scan */
        .scan-layer {
            position: absolute;
            width: 100%; height: 100%;
            background: url('scan.jpg') no-repeat center center;
            background-size: cover;
            background-color: #000;
            -webkit-mask-image: radial-gradient(circle at var(--x) var(--y), transparent 80px, black 130px);
            mask-image: radial-gradient(circle at var(--x) var(--y), transparent 80px, black 130px);
        }

        .reticle {
            position: fixed;
            width: 160px; height: 160px;
            border: 2px dashed rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            left: var(--x); top: var(--y);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="row">
            <div>PT: Johnathan Neshshshsh<br>ID: Mar-06-2026<br>SEX: M</div>
            <div><br>MODE: MRI_SURPRISE<br>THK: 5.0mm</div>
        </div>
        <div class="row">
            <div>W: 350 L: 40<br>ZOOM: 1.0x</div>
            <div>IMPRESSION: <span style="color: white; background: red; padding: 2px;">Some guy's brain or something idk</span></div>
        </div>
    </div>

    <div class="birthday-layer">
        
        <div class="header-grid">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExdmtlNXQyNHQxOWp2M2h3Zmp3OHhyeTB3ano5dWUybHR4cXhlOGhuYSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/RjVP4ZoxA3xeReLQT0/giphy.gif" class="bday-gif">
            
            <div class="birthday-text">HAPPY<br>BIRTHDAY!</div>
            
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExN21qOGNzaHF2MjRwbDJwYXY3eGEwNzJ4MzQ4bjB6Y2w2MjBvZWptYSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/wM0IbbTKs2yhXck0sP/giphy.gif" class="bday-gif">
        </div>

        <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNzA0cjJrOW9uenlkZGszdzFmYmk0b2Ywb2dzcGV4OXp5bTltcXlmcCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/dwmTtW4IuyDzOpLgqO/giphy.gif" class="bday-gif main-gif-under">
        
        <p style="color: white; font-weight: bold; margin-top: 20px;">(Diagnosis: Absolute Legend)</p>
    </div>

    <div class="scan-layer"></div>
    <div class="reticle"></div>

    <script>
        const root = document.documentElement;

        function handleInput(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            root.style.setProperty('--x', clientX + 'px');
            root.style.setProperty('--y', clientY + 'px');
        }

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchmove', handleInput, { passive: false });
    </script>
</body>
</html>
